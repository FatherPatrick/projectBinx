services:
  db:
    image: postgres:16-alpine
    container_name: projectbinx-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-projectbinx}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - projectbinx_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-projectbinx}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectbinx-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      API_BASE_URL: http://localhost:4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-projectbinx}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSL: 'false'
    ports:
      - '4000:4000'

volumes:
  projectbinx_db_data: